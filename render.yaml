services:
  - type: web
    name: smart-attendance
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-attendance-db
          property: connectionString
      - key: DEBUG
        value: false

databases:
  - name: smart-attendance-db
    plan: free